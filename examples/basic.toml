# A basic TOML example for cfTOML Phase 3
title = "cfTOML Example"
version = 1.0
released = 2024-01-15T10:30:00Z

[server]
host = "10.0.0.1"
port = 8080
enabled = true

[server.config]
timeout = 30
retries = 3

[client]
host = "10.0.0.2"
port = 9090

[features]
tags = ["alpha", "beta", "stable"]
counts = [1, 2, 3]
endpoint = {host = "10.0.0.1", port = 9090}

[[products]]
name = "widget"
sku = "W-001"

[[products]]
name = "gadget"
sku = "G-002"

[[products.suppliers]]
name = "Acme"

[[products.suppliers]]
name = "Globex"
